apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-5o
  namespace: foundation
  labels:
    app.kubernetes.io/instance: ai-5o
    app.kubernetes.io/name: ai-5o
    app.kubernetes.io/component: vllm-model
    app.kubernetes.io/managed-by: automated-pipeline
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: ai-5o
      app.kubernetes.io/name: ai-5o
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: ai-5o
        app.kubernetes.io/name: ai-5o
        app.kubernetes.io/component: vllm-model
        app: vllm
    spec:
      containers:
        - name: ai-5o
          image: vllm/vllm-openai:latest
          args:
            - --model
            - /models/ai-polishing
            - --served-model-name
            - ai-5o
            - --port
            - 8000
            - --tensor-parallel-size
            - 2
            - --enable-auto-tool-choice
          env:
            - name: LOG_LEVEL
              value: INFO
            - name: VLLM_ATTENTION_BACKEND
              value: XFORMERS
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 3
          resources:
            limits:
              nvidia.com/gpu: "2"
              memory: "32Gi"
              cpu: "8"
            requests:
              nvidia.com/gpu: "2"
              memory: "16Gi"
              cpu: "4"
          securityContext:
            capabilities:
              add:
                - SYS_PTRACE
            runAsNonRoot: false
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: model-storage
              mountPath: /models
              readOnly: true
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: ai-blob-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
      nodeSelector:
        accelerator: nvidia-gpu
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
