apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-polishing
  namespace: foundation
  labels:
    app.kubernetes.io/instance: vllm-model
    app.kubernetes.io/name: vllm-model
  annotations:
    app.kubernetes.io/instance: vllm-model
    app.kubernetes.io/name: vllm-model
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: ai-polishing
      app.kubernetes.io/name: ai-polishing
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: ai-polishing
        app.kubernetes.io/name: ai-polishing
        app: vllm
    spec:
      imagePullSecrets:
        - name: image-pull-secret
      containers:
        - name: ai-polishing
          image: 'vllm/vllm-openai:latest'
          args:
            - '--model'
            - '/models/ai-polishing'
            - '--served-model-name'
            - 'ai-polishing'
            - '--port'
            - '80'
            - '--tensor-parallel-size'
            - '4'
            - '--enable-auto-tool-choice'
          env:
            - name: LOG_LEVEL
              value: 'DEBUG'
            - name: VLLM_ATTENTION_BACKEND
              value: 'XFORMERS'
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          resources:
            limits:
              nvidia.com/gpu: "4"
            requests:
              nvidia.com/gpu: "4"
          securityContext:
            capabilities:
              add:
                - SYS_PTRACE
          volumeMounts:
            - name: azureblob-pv
              mountPath: /models
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: azureblob-pv
          persistentVolumeClaim:
            claimName: ai-blob-pvc
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
